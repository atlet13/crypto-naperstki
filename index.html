<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КРИПТО НАПЕРСТКИ • TON Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Inter', system_ui, sans-serif;
            color: white;
            overflow-x: hidden;
        }
        .neon-text { text-shadow: 0 0 15px #00ff9d, 0 0 30px #00ff9d, 0 0 50px #ff00aa; }
        .star-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 4s infinite alternate; box-shadow: 0 0 8px #00ff9d; }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        .cup { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 30px 30px rgba(234,179,8,0.6)); }
        .cup:hover { transform: scale(1.12) rotate(12deg); }
        .winning-spin { animation: winSpin 0.7s linear infinite; }
        @keyframes winSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .ticker { overflow: hidden; white-space: nowrap; background: linear-gradient(90deg, #1a0033, #2a0044); border-top: 3px solid #00ff9d; }
        .ticker-content { display: inline-flex; animation: ticker-slide 28s linear infinite; }
        @keyframes ticker-slide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- HEADER -->
    <div class="fixed top-0 left-0 right-0 bg-black/90 backdrop-blur-lg z-50 border-b border-emerald-500/30">
        <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-4xl">🥇</div>
                <div>
                    <h1 class="text-3xl font-bold neon-text">КРИПТО НАПЕРСТКИ</h1>
                    <p class="text-emerald-400 -mt-1">TON • x2 • LIVE</p>
                </div>
            </div>
            <div onclick="showWallet()" class="flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-3xl border border-emerald-400 cursor-pointer">
                <span class="text-2xl">₮</span>
                <span id="balance" class="font-mono text-3xl font-bold text-emerald-400">87.45</span>
            </div>
        </div>
    </div>

    <!-- LIVE ТІКЕР -->
    <div class="ticker py-2 text-sm fixed top-[68px] left-0 right-0 z-40">
        <div id="ticker-content" class="ticker-content text-emerald-300 font-medium"></div>
    </div>

    <div class="pt-28 max-w-2xl mx-auto px-4">
        <!-- Бонус -->
        <div class="bg-gradient-to-br from-amber-900 to-yellow-900 border border-yellow-400 rounded-3xl p-6 mb-8 text-center">
            <h2 class="text-4xl font-bold neon-text">ВІТАЛЬНИЙ БОНУС!</h2>
            <p class="text-yellow-200 text-xl">+100 TON на перший депозит</p>
            <button onclick="claimBonus()" class="mt-4 w-full py-4 bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-bold text-2xl rounded-3xl">ЗАБРАТИ БОНУС</button>
        </div>

        <!-- Ставка -->
        <div class="bg-zinc-900/80 border border-yellow-500/30 rounded-3xl p-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xl">Ставка</span>
                <div class="flex items-center gap-4">
                    <button onclick="changeBet(-25)" class="w-12 h-12 bg-zinc-800 rounded-2xl text-4xl">-</button>
                    <div id="bet-amount" class="font-mono text-6xl font-bold text-yellow-400 w-28 text-center">50</div>
                    <button onclick="changeBet(25)" class="w-12 h-12 bg-zinc-800 rounded-2xl text-4xl">+</button>
                </div>
                <span class="text-emerald-400">TON</span>
            </div>
            <div class="grid grid-cols-5 gap-2">
                <button onclick="setBet(10)" class="py-4 bg-zinc-800 rounded-2xl">10</button>
                <button onclick="setBet(25)" class="py-4 bg-zinc-800 rounded-2xl">25</button>
                <button onclick="setBet(50)" class="py-4 bg-zinc-800 rounded-2xl font-bold">50</button>
                <button onclick="setBet(100)" class="py-4 bg-zinc-800 rounded-2xl">100</button>
                <button onclick="setBet(250)" class="py-4 bg-zinc-800 rounded-2xl">250</button>
            </div>
            <button onclick="startGame()" class="w-full mt-8 py-7 text-3xl font-black bg-gradient-to-r from-yellow-400 to-orange-500 text-black rounded-3xl">🚀 ГРАТИ ЗА TON</button>
        </div>

        <!-- ГРА -->
        <div class="relative min-h-[380px]">
            <div class="flex justify-center gap-8 items-end" id="cups-row">
                <div onclick="selectCup(0)" id="cup-0" class="cup flex flex-col items-center cursor-pointer">
                    <div class="w-32 h-40 bg-gradient-to-b from-orange-400 via-amber-500 to-yellow-600 rounded-t-[40px] border-4 border-yellow-300 flex items-center justify-center relative overflow-hidden">
                        <div class="text-7xl">₮</div>
                        <div class="absolute top-6 text-xs font-black tracking-widest bg-gradient-to-r from-cyan-400 to-purple-500 px-6 py-1 rounded-3xl">TON x2</div>
                    </div>
                    <div class="w-32 h-8 bg-amber-800 rounded-3xl -mt-3"></div>
                    <div class="mt-3">1</div>
                </div>
                <div onclick="selectCup(1)" id="cup-1" class="cup flex flex-col items-center cursor-pointer scale-110">
                    <div class="w-32 h-40 bg-gradient-to-b from-orange-400 via-amber-500 to-yellow-600 rounded-t-[40px] border-4 border-yellow-300 flex items-center justify-center relative overflow-hidden">
                        <div class="text-7xl">₮</div>
                        <div class="absolute top-6 text-xs font-black tracking-widest bg-gradient-to-r from-cyan-400 to-purple-500 px-6 py-1 rounded-3xl">TON x2</div>
                    </div>
                    <div class="w-32 h-8 bg-amber-800 rounded-3xl -mt-3"></div>
                    <div class="mt-3">2</div>
                </div>
                <div onclick="selectCup(2)" id="cup-2" class="cup flex flex-col items-center cursor-pointer">
                    <div class="w-32 h-40 bg-gradient-to-b from-orange-400 via-amber-500 to-yellow-600 rounded-t-[40px] border-4 border-yellow-300 flex items-center justify-center relative overflow-hidden">
                        <div class="text-7xl">₮</div>
                        <div class="absolute top-6 text-xs font-black tracking-widest bg-gradient-to-r from-cyan-400 to-purple-500 px-6 py-1 rounded-3xl">TON x2</div>
                    </div>
                    <div class="w-32 h-8 bg-amber-800 rounded-3xl -mt-3"></div>
                    <div class="mt-3">3</div>
                </div>
            </div>
            <div id="ball" class="hidden absolute text-7xl left-1/2 -translate-x-1/2 top-[160px]">⚪</div>
        </div>

        <div id="status" class="text-center text-2xl font-medium text-yellow-300 mt-8 min-h-[40px]"></div>
    </div>

    <!-- МОДАЛКА ПОПОВНЕННЯ -->
    <div id="deposit-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
            <h2 class="text-3xl font-bold text-center mb-6">ПОПОВНЕННЯ</h2>
            <div class="bg-zinc-800 p-4 rounded-2xl mb-6 font-mono text-sm break-all" id="ton-address">
                UQBTdndbuHIk_K6YkdLc1Spoy1Pg7l1NqT1dYpscq6J2n5rj
            </div>
            <input id="ton-amount" type="number" value="50" class="w-full bg-zinc-800 text-center text-4xl py-6 rounded-3xl mb-6">
            <button onclick="sendDepositRequest()" class="w-full py-6 bg-emerald-500 text-black font-bold text-2xl rounded-3xl">Я НАДІСЛАВ • ЗАРАХУВАТИ</button>
            <button onclick="hideDepositModal()" class="mt-4 text-zinc-400 w-full">Закрити</button>
        </div>
    </div>

    <!-- Результат -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-xs w-full text-center">
            <div id="result-icon" class="text-8xl mb-6"></div>
            <h3 id="result-title" class="text-4xl font-bold"></h3>
            <p id="result-subtitle" class="text-zinc-400 mt-2 mb-8"></p>
            <button onclick="hideModal(); resetGame()" class="w-full py-6 bg-gradient-to-r from-emerald-500 to-cyan-500 text-black font-bold rounded-3xl">ГРАТИ ЗНОВУ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let balance = 87.45;
        let currentBet = 50;
        let ballPosition = -1;
        let isShuffling = false;
        let playerChoice = -1;
        let winProbability = 0.33;
        const BACKEND_URL = "https://crypto-naperstki.onrender.com"; // ← заміни після деплою

        // Фейковий тікер
        const fakeWins = ["@tonhunter_ua +87 TON", "@crypto_king42 +245 TON", "@lucky_whale +120 TON", "@naprstki_pro +65 TON", "@ua_ton_boss +310 TON"];
        function startTicker() {
            const container = document.getElementById('ticker-content');
            fakeWins.forEach(text => {
                const div = document.createElement('div');
                div.className = "px-8 flex-shrink-0";
                div.textContent = text;
                container.appendChild(div);
            });
            // Дублікат для плавної анімації
            fakeWins.forEach(text => {
                const div = document.createElement('div');
                div.className = "px-8 flex-shrink-0";
                div.textContent = text;
                container.appendChild(div);
            });
        }

        function loadBalance() {
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        function depositModal() {
            document.getElementById('deposit-modal').classList.remove('hidden');
        }

        function hideDepositModal() {
            document.getElementById('deposit-modal').classList.add('hidden');
        }

        async function sendDepositRequest() {
            const amount = parseFloat(document.getElementById('ton-amount').value) || 50;
            const user = tg.initDataUnsafe?.user || { id: 123, username: "test" };

            await fetch(`${BACKEND_URL}/api/deposit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tgId: user.id, username: user.username, amount })
            });

            tg.showAlert(`✅ Запит на ${amount} TON відправлено адміну!`);
            hideDepositModal();
        }

        function claimBonus() {
            balance += 100;
            loadBalance();
            tg.showAlert("🎉 +100 TON бонус зараховано!");
        }

        function showWallet() {
            tg.showAlert(`💰 Ваш баланс: ${balance.toFixed(2)} TON`);
        }

        function changeBet(delta) {
            currentBet = Math.max(10, Math.min(500, currentBet + delta));
            document.getElementById('bet-amount').textContent = currentBet;
        }

        function setBet(val) {
            currentBet = val;
            document.getElementById('bet-amount').textContent = currentBet;
        }

        function startGame() {
            if (balance < currentBet) return tg.showAlert("❌ Недостатньо TON!");
            balance -= currentBet;
            loadBalance();

            isShuffling = true;
            document.getElementById('status').innerHTML = '🔥 КЛАДЕМО М’ЯЧ... ПЕРЕМІШУЄМО!';

            ballPosition = Math.random() < winProbability ? Math.floor(Math.random()*3) : Math.floor(Math.random()*3);

            const ball = document.getElementById('ball');
            ball.classList.remove('hidden');
            ball.style.transition = 'none';
            ball.style.left = '50%';
            ball.style.top = '160px';

            setTimeout(() => {
                ball.style.transition = 'all 1.4s';
                ball.style.top = '110px';
                ball.style.left = `${40 + ballPosition * 135}px`;
            }, 300);

            setTimeout(shuffleCups, 1600);
        }

        function shuffleCups() {
            let count = 0;
            const interval = setInterval(() => {
                count++;
                document.querySelectorAll('.cup').forEach(cup => {
                    cup.style.transform = `translateX(${Math.random()*160-80}px) rotate(${Math.random()*40-20}deg)`;
                });
                if (count > 22) {
                    clearInterval(interval);
                    document.querySelectorAll('.cup').forEach(c => c.style.transform = '');
                    document.getElementById('ball').classList.add('hidden');
                    document.getElementById('status').textContent = '👉 ОБЕРІТЬ СТАКАНЧИК!';
                    isShuffling = false;
                }
            }, 90);
        }

        function selectCup(index) {
            if (isShuffling || playerChoice !== -1) return;
            playerChoice = index;

            const won = ballPosition === index;
            if (won) {
                balance += currentBet * 2;
                loadBalance();
                document.getElementById(`cup-${index}`).classList.add('winning-spin');
                setTimeout(() => {
                    document.getElementById(`cup-${index}`).classList.remove('winning-spin');
                    showResult(true);
                }, 1500);
            } else {
                showResult(false);
            }
        }

        function showResult(won) {
            const modal = document.getElementById('result-modal');
            document.getElementById('result-icon').innerHTML = won ? '🎉' : '😢';
            document.getElementById('result-title').innerHTML = won ? `x2 ВИГРАШ!<br><span class="text-emerald-400">+${(currentBet*2).toFixed(0)} TON</span>` : 'ПРОГРАШ';
            document.getElementById('result-subtitle').textContent = won ? 'М’яч крутився шалено!' : 'Не цього разу...';
            modal.classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('result-modal').classList.add('hidden');
        }

        function resetGame() {
            document.getElementById('status').innerHTML = '';
            playerChoice = -1;
        }

        // Ініціалізація
        function init() {
            tg.MainButton.setText("ГРАТИ");
            tg.MainButton.show();
            tg.MainButton.onClick(startGame);

            startTicker();
            loadBalance();

            // Зірки
            const stars = document.createElement('div');
            stars.className = 'star-bg';
            for (let i = 0; i < 120; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.width = s.style.height = Math.random() * 3 + 1 + 'px';
                stars.appendChild(s);
            }
            document.body.appendChild(stars);

            console.log('%c🎮 Крипто Наперстки запущено!', 'color:#00ff9d;font-size:18px');
        }

        window.onload = init;
    </script>
</body>
</html>
