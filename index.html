<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КРИПТО НАПЕРСТКИ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        
        .neon {
            text-shadow: 0 0 20px #fff, 0 0 40px #ffd700;
        }
        
        .cup {
            transition: transform 0.08s linear;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.6));
        }
        
        .winning-spin {
            animation: winSpin 0.65s linear infinite;
        }
        
        @keyframes winSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- HEADER -->
    <div class="fixed top-0 left-0 right-0 bg-black/90 border-b border-yellow-400/30 z-50">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <div class="text-4xl">🥇</div>
                <div>
                    <h1 class="text-3xl font-black neon">КРИПТО НАПЕРСТКИ</h1>
                    <p class="text-emerald-400 text-sm -mt-1">TON • x2 • LIVE</p>
                </div>
            </div>
            <div onclick="showBalance()" class="bg-zinc-900 border border-emerald-400 rounded-3xl px-6 py-2 flex items-center gap-2 cursor-pointer">
                <span class="text-3xl">₮</span>
                <span id="balance" class="font-black text-3xl text-emerald-400">587.45</span>
            </div>
        </div>
    </div>

    <div class="pt-20 px-4 max-w-2xl mx-auto">

        <!-- ВІТАЛЬНИЙ БОНУС -->
        <div id="bonus-card" class="bg-gradient-to-br from-orange-500 to-amber-600 rounded-3xl p-8 text-center mb-8 shadow-2xl">
            <h2 class="text-4xl font-black neon mb-2">ВІТАЛЬНИЙ БОНУС!</h2>
            <p class="text-2xl text-white/90">+100 TON на перший депозит</p>
            <button onclick="claimBonus()" id="bonus-btn"
                    class="mt-6 w-full py-6 bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-2xl rounded-3xl shadow-xl">
                ЗАБРАТИ БОНУС
            </button>
        </div>

        <!-- СТАВКА -->
        <div class="bg-zinc-900/90 rounded-3xl p-6 mb-8">
            <div class="flex justify-between items-center mb-5">
                <span class="text-xl">Ставка</span>
                <div class="flex items-center gap-6">
                    <button onclick="changeBet(-25)" class="w-16 h-16 bg-zinc-800 rounded-3xl text-5xl font-bold">-</button>
                    <div id="bet-amount" class="text-7xl font-black text-yellow-400 w-36 text-center">100</div>
                    <button onclick="changeBet(25)" class="w-16 h-16 bg-zinc-800 rounded-3xl text-5xl font-bold">+</button>
                </div>
                <span class="text-emerald-400 text-2xl">TON</span>
            </div>

            <div class="grid grid-cols-5 gap-3">
                <button onclick="setBet(10)" class="py-5 bg-zinc-800 rounded-2xl">10</button>
                <button onclick="setBet(25)" class="py-5 bg-zinc-800 rounded-2xl">25</button>
                <button onclick="setBet(50)" class="py-5 bg-zinc-800 rounded-2xl">50</button>
                <button onclick="setBet(100)" class="py-5 bg-zinc-800 rounded-2xl font-bold">100</button>
                <button onclick="setBet(250)" class="py-5 bg-zinc-800 rounded-2xl">250</button>
            </div>

            <button onclick="startGame()" class="mt-8 w-full py-7 bg-gradient-to-r from-orange-500 to-yellow-500 text-black font-black text-3xl rounded-3xl">
                🚀 ГРАТИ ЗА TON
            </button>
        </div>

        <!-- СТАКАНЧИКИ (як на фото) -->
        <div class="flex justify-center gap-8" id="cups-row">
            <div onclick="selectCup(0)" id="cup-0" class="cup text-center">
                <div class="relative mx-auto w-28">
                    <div class="bg-gradient-to-b from-orange-400 via-orange-500 to-orange-600 h-36 rounded-t-3xl border-4 border-white/30 relative overflow-hidden">
                        <div class="absolute top-6 left-1/2 -translate-x-1/2 w-16 h-6 bg-gradient-to-r from-yellow-300 to-amber-300 rounded"></div>
                        <div class="absolute top-14 left-1/2 -translate-x-1/2 w-20 h-5 bg-white/30 rounded"></div>
                    </div>
                    <div class="bg-white h-8 w-28 mx-auto -mt-1 rounded-b-3xl border border-orange-700"></div>
                </div>
                <div class="mt-3 text-xl font-medium">1</div>
            </div>

            <div onclick="selectCup(1)" id="cup-1" class="cup text-center scale-110">
                <div class="relative mx-auto w-28">
                    <div class="bg-gradient-to-b from-orange-400 via-orange-500 to-orange-600 h-36 rounded-t-3xl border-4 border-white/30 relative overflow-hidden">
                        <div class="absolute top-6 left-1/2 -translate-x-1/2 w-16 h-6 bg-gradient-to-r from-yellow-300 to-amber-300 rounded"></div>
                        <div class="absolute top-14 left-1/2 -translate-x-1/2 w-20 h-5 bg-white/30 rounded"></div>
                    </div>
                    <div class="bg-white h-8 w-28 mx-auto -mt-1 rounded-b-3xl border border-orange-700"></div>
                </div>
                <div class="mt-3 text-xl font-medium">2</div>
            </div>

            <div onclick="selectCup(2)" id="cup-2" class="cup text-center">
                <div class="relative mx-auto w-28">
                    <div class="bg-gradient-to-b from-orange-400 via-orange-500 to-orange-600 h-36 rounded-t-3xl border-4 border-white/30 relative overflow-hidden">
                        <div class="absolute top-6 left-1/2 -translate-x-1/2 w-16 h-6 bg-gradient-to-r from-yellow-300 to-amber-300 rounded"></div>
                        <div class="absolute top-14 left-1/2 -translate-x-1/2 w-20 h-5 bg-white/30 rounded"></div>
                    </div>
                    <div class="bg-white h-8 w-28 mx-auto -mt-1 rounded-b-3xl border border-orange-700"></div>
                </div>
                <div class="mt-3 text-xl font-medium">3</div>
            </div>
        </div>

        <div id="status" class="text-center text-2xl font-bold text-yellow-300 mt-10 min-h-[48px]"></div>
    </div>

    <!-- Нижні кнопки -->
    <div class="fixed bottom-6 left-4 right-4 flex gap-3 max-w-2xl mx-auto">
        <button onclick="depositModal()" class="flex-1 py-6 bg-emerald-600 font-bold text-xl rounded-3xl">ПОПОВНИТИ</button>
        <button onclick="withdrawModal()" class="flex-1 py-6 bg-zinc-700 font-bold text-xl rounded-3xl">ВИВЕСТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let balance = 587.45;
        let currentBet = 100;
        let ballPosition = -1;
        let isShuffling = false;
        let playerChoice = -1;
        let bonusClaimed = false;

        function loadBalance() {
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        function claimBonus() {
            if (bonusClaimed) return tg.showAlert("Бонус вже було забрано!");
            bonusClaimed = true;
            balance += 100;
            loadBalance();
            tg.showAlert("🎉 +100 TON бонус успішно зараховано!");
            const btn = document.getElementById('bonus-btn');
            btn.style.opacity = "0.5";
            btn.textContent = "БОНУС ЗАРАХОВАНО ✓";
        }

        function depositModal() {
            tg.showPopup({
                title: "ПОПОВНЕННЯ",
                message: "TON адреса:\nUQBTdndbuHIk_K6YkdLc1Spoy1Pg7l1NqT1dYpscq6J2n5rj",
                buttons: [{ id: "sent", text: "Я НАДІСЛАВ" }]
            }, () => tg.showAlert("✅ Запит відправлено адміну!"));
        }

        function withdrawModal() {
            const amount = prompt("Скільки TON вивести?", "200");
            if (amount) tg.showAlert(`✅ Запит на вивід ${amount} TON прийнято`);
        }

        function changeBet(delta) {
            currentBet = Math.max(10, Math.min(500, currentBet + delta));
            document.getElementById('bet-amount').textContent = currentBet;
        }

        function setBet(val) {
            currentBet = val;
            document.getElementById('bet-amount').textContent = currentBet;
        }

        function startGame() {
            if (balance < currentBet) return tg.showAlert("❌ Недостатньо TON!");

            balance -= currentBet;
            loadBalance();
            isShuffling = true;
            playerChoice = -1;

            document.getElementById('status').innerHTML = '🔥 Кладемо м’яч... <b>ПЕРЕМІШУЄМО!</b>';

            ballPosition = Math.random() < 0.35 ? Math.floor(Math.random() * 3) : Math.floor(Math.random() * 3);

            setTimeout(shuffleCups, 800);
        }

        function shuffleCups() {
            const cups = [
                document.getElementById('cup-0'),
                document.getElementById('cup-1'),
                document.getElementById('cup-2')
            ];

            let count = 0;
            const interval = setInterval(() => {
                count++;
                cups.forEach(cup => {
                    const x = Math.random() * 120 - 60;
                    const rot = Math.random() * 45 - 22;
                    cup.style.transform = `translateX(${x}px) rotate(${rot}deg)`;
                });

                if (count > 32) {
                    clearInterval(interval);
                    cups.forEach(cup => {
                        cup.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                        cup.style.transform = '';
                    });
                    document.getElementById('status').innerHTML = '👉 <b>Оберіть стаканчик!</b>';
                    isShuffling = false;
                }
            }, 70);
        }

        function selectCup(index) {
            if (isShuffling || playerChoice !== -1) return;
            playerChoice = index;

            const won = ballPosition === index;
            if (won) {
                balance += currentBet * 2;
                loadBalance();
                const winner = document.getElementById(`cup-${index}`);
                winner.classList.add('winning-spin');
                setTimeout(() => {
                    winner.classList.remove('winning-spin');
                    tg.showAlert(`🎉 ВИГРАШ! +${currentBet * 2} TON`);
                }, 1400);
            } else {
                tg.showAlert('😢 М’яч був під іншим стаканчиком...');
            }
        }

        function showBalance() {
            tg.showAlert(`💰 Ваш баланс: ${balance.toFixed(2)} TON`);
        }

        window.onload = () => {
            loadBalance();
            console.log('%c🚀 Крипто Наперстки — повна версія готова!', 'color:#22ff88;font-size:18px');
        };
    </script>
</body>
</html>
